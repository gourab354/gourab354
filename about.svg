<svg width="680" height="340" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>About Gourab — IoT Developer</title>
  <desc>Animated neon cyberpunk profile card for Gourab</desc>

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&amp;family=Share+Tech+Mono&amp;display=swap');

      .card { animation: slideUp 0.6s cubic-bezier(0.22,1,0.36,1) both; }
      .c1   { animation-delay: 0.05s; }
      .c2   { animation-delay: 0.15s; }
      .c3   { animation-delay: 0.25s; }
      .c4   { animation-delay: 0.35s; }
      .c5   { animation-delay: 0.45s; }

      @keyframes slideUp {
        from { opacity: 0; transform: translateY(18px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .title-txt {
        font-family: 'Orbitron', 'Share Tech Mono', monospace;
        font-size: 26px;
        font-weight: 700;
        fill: #00ffff;
        letter-spacing: 4px;
        animation: fadeIn 0.5s ease both;
      }
      .sub-txt {
        font-family: 'Share Tech Mono', monospace;
        font-size: 11px;
        fill: #ff00aa;
        letter-spacing: 2.5px;
        animation: fadeIn 0.5s 0.1s ease both;
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }

      .label {
        font-family: 'Share Tech Mono', monospace;
        font-size: 9px;
        fill: #ff00aa;
        letter-spacing: 2px;
      }
      .val {
        font-family: 'Share Tech Mono', monospace;
        font-size: 12px;
        fill: #cce8ff;
      }
      .val-cyan   { fill: #00ffff; font-family: 'Share Tech Mono', monospace; font-size: 12px; }
      .val-green  { fill: #39ff14; font-family: 'Share Tech Mono', monospace; font-size: 12px; }
      .val-pink   { fill: #ff66cc; font-family: 'Share Tech Mono', monospace; font-size: 12px; }
      .val-orange { fill: #ffaa33; font-family: 'Share Tech Mono', monospace; font-size: 12px; }

      .tag-txt {
        font-family: 'Share Tech Mono', monospace;
        font-size: 9.5px;
      }

      .pulse-dot {
        animation: pulse 1.6s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.2; }
      }

      .scanline {
        animation: scan 5s linear infinite;
      }
      @keyframes scan {
        0%   { transform: translateY(0); opacity: 0.07; }
        50%  { opacity: 0.13; }
        100% { transform: translateY(340px); opacity: 0.07; }
      }
    </style>

    <clipPath id="main-clip">
      <rect width="680" height="340" rx="14"/>
    </clipPath>
  </defs>

  <!-- background -->
  <rect width="680" height="340" rx="14" fill="#080b14"/>

  <!-- grid lines -->
  <g clip-path="url(#main-clip)" opacity="0.06">
    <line x1="0" y1="32"  x2="680" y2="32"  stroke="#00ffff" stroke-width="0.5"/>
    <line x1="0" y1="64"  x2="680" y2="64"  stroke="#00ffff" stroke-width="0.5"/>
    <line x1="0" y1="96"  x2="680" y2="96"  stroke="#00ffff" stroke-width="0.5"/>
    <line x1="0" y1="128" x2="680" y2="128" stroke="#00ffff" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="680" y2="160" stroke="#00ffff" stroke-width="0.5"/>
    <line x1="0" y1="192" x2="680" y2="192" stroke="#00ffff" stroke-width="0.5"/>
    <line x1="0" y1="224" x2="680" y2="224" stroke="#00ffff" stroke-width="0.5"/>
    <line x1="0" y1="256" x2="680" y2="256" stroke="#00ffff" stroke-width="0.5"/>
    <line x1="0" y1="288" x2="680" y2="288" stroke="#00ffff" stroke-width="0.5"/>
    <line x1="0" y1="320" x2="680" y2="320" stroke="#00ffff" stroke-width="0.5"/>
    <line x1="32"  y1="0" x2="32"  y2="340" stroke="#00ffff" stroke-width="0.5"/>
    <line x1="64"  y1="0" x2="64"  y2="340" stroke="#00ffff" stroke-width="0.5"/>
    <line x1="96"  y1="0" x2="96"  y2="340" stroke="#00ffff" stroke-width="0.5"/>
    <line x1="128" y1="0" x2="128" y2="340" stroke="#00ffff" stroke-width="0.5"/>
    <line x1="160" y1="0" x2="160" y2="340" stroke="#00ffff" stroke-width="0.5"/>
    <line x1="192" y1="0" x2="192" y2="340" stroke="#00ffff" stroke-width="0.5"/>
    <line x1="224" y1="0" x2="224" y2="340" stroke="#00ffff" stroke-width="0.5"/>
    <line x1="256" y1="0" x2="256" y2="340" stroke="#00ffff" stroke-width="0.5"/>
    <line x1="288" y1="0" x2="288" y2="340" stroke="#00ffff" stroke-width="0.5"/>
    <line x1="320" y1="0" x2="320" y2="340" stroke="#00ffff" stroke-width="0.5"/>
    <line x1="352" y1="0" x2="352" y2="340" stroke="#00ffff" stroke-width="0.5"/>
    <line x1="384" y1="0" x2="384" y2="340" stroke="#00ffff" stroke-width="0.5"/>
    <line x1="416" y1="0" x2="416" y2="340" stroke="#00ffff" stroke-width="0.5"/>
    <line x1="448" y1="0" x2="448" y2="340" stroke="#00ffff" stroke-width="0.5"/>
    <line x1="480" y1="0" x2="480" y2="340" stroke="#00ffff" stroke-width="0.5"/>
    <line x1="512" y1="0" x2="512" y2="340" stroke="#00ffff" stroke-width="0.5"/>
    <line x1="544" y1="0" x2="544" y2="340" stroke="#00ffff" stroke-width="0.5"/>
    <line x1="576" y1="0" x2="576" y2="340" stroke="#00ffff" stroke-width="0.5"/>
    <line x1="608" y1="0" x2="608" y2="340" stroke="#00ffff" stroke-width="0.5"/>
    <line x1="640" y1="0" x2="640" y2="340" stroke="#00ffff" stroke-width="0.5"/>
    <line x1="672" y1="0" x2="672" y2="340" stroke="#00ffff" stroke-width="0.5"/>
  </g>

  <!-- scanline sweep -->
  <rect class="scanline" x="0" y="-30" width="680" height="30" fill="#00ffff" clip-path="url(#main-clip)"/>

  <!-- corner brackets -->
  <g stroke="#00ffff" stroke-width="1.5" fill="none" opacity="0.7">
    <polyline points="24,40 24,26 38,26"/>
    <polyline points="642,26 656,26 656,40"/>
    <polyline points="24,300 24,314 38,314"/>
    <polyline points="642,314 656,314 656,300"/>
  </g>

  <!-- header -->
  <text x="340" y="58" text-anchor="middle" class="title-txt">GOURAB</text>
  <text x="340" y="74" text-anchor="middle" class="sub-txt">IOT DEVELOPER  /  ELECTRONICS ENTHUSIAST</text>

  <!-- divider line -->
  <line x1="40" y1="84" x2="640" y2="84" stroke="#00ffff" stroke-width="0.5" opacity="0.3"/>

  <!-- CARD 1 — identity -->
  <g class="card c1">
    <rect x="28" y="94" width="190" height="72" rx="8" fill="#00ffff" fill-opacity="0.04" stroke="#00ffff" stroke-width="0.8" stroke-opacity="0.25"/>
    <text x="42" y="110" class="label">// IDENTITY</text>
    <text x="42" y="128"><tspan class="val-cyan">NAME</tspan><tspan class="val"> — Gourab</tspan></text>
    <text x="42" y="146"><tspan class="val-cyan">BASE</tspan><tspan class="val"> — West Bengal, IN</tspan></text>
    <text x="42" y="157"><tspan class="val-cyan">ROLE</tspan><tspan class="val"> — IoT Dev</tspan></text>
  </g>

  <!-- CARD 2 — status -->
  <g class="card c2">
    <rect x="228" y="94" width="200" height="72" rx="8" fill="#39ff14" fill-opacity="0.03" stroke="#39ff14" stroke-width="0.8" stroke-opacity="0.22"/>
    <text x="242" y="110" class="label">// STATUS</text>
    <circle cx="252" cy="126" r="5" fill="#39ff14" class="pulse-dot"/>
    <text x="264" y="130" class="val-green">ACTIVE</text>
    <text x="242" y="147" class="val">Building Smart</text>
    <text x="242" y="160" class="val">Medicine Box</text>
  </g>

  <!-- CARD 3 — achievements -->
  <g class="card c3">
    <rect x="438" y="94" width="214" height="72" rx="8" fill="#ff00aa" fill-opacity="0.04" stroke="#ff00aa" stroke-width="0.8" stroke-opacity="0.25"/>
    <text x="452" y="110" class="label">// ACHIEVEMENTS</text>
    <text x="452" y="128"><tspan class="val-pink">3×</tspan><tspan class="val"> Hackathon Finalist</tspan></text>
    <text x="452" y="146"><tspan class="val-pink">1×</tspan><tspan class="val"> Hackathon Winner</tspan></text>
    <text x="452" y="157"><tspan class="val-pink">2×</tspan><tspan class="val"> 1st Prize — FOSET</tspan></text>
  </g>

  <!-- CARD 4 — hardware -->
  <g class="card c4">
    <rect x="28" y="178" width="300" height="66" rx="8" fill="#a300ff" fill-opacity="0.04" stroke="#a300ff" stroke-width="0.8" stroke-opacity="0.22"/>
    <text x="42" y="194" class="label">// HARDWARE STACK</text>
    <text x="42" y="212" class="val">ESP32 · HC-SR04 · TTP223 · Servo</text>
    <text x="42" y="228" class="val">ST7735 TFT · Buzzer · NTP (IST)</text>
  </g>

  <!-- CARD 5 — software -->
  <g class="card c5">
    <rect x="338" y="178" width="314" height="66" rx="8" fill="#00ffff" fill-opacity="0.03" stroke="#00ffff" stroke-width="0.8" stroke-opacity="0.2"/>
    <text x="352" y="194" class="label">// SOFTWARE STACK</text>
    <text x="352" y="212" class="val">Node.js · WebSocket · REST API</text>
    <text x="352" y="228" class="val">Python · TensorFlow · Django REST</text>
  </g>

  <!-- TAGS ROW label -->
  <text x="42" y="264" class="label">// FOCUS.EXE</text>

  <!-- tag: Embedded Systems -->
  <g class="card c1">
    <rect x="28" y="271" width="118" height="20" rx="10" fill="#00ffff" fill-opacity="0.1" stroke="#00ffff" stroke-width="0.7" stroke-opacity="0.4"/>
    <text x="87" y="285" text-anchor="middle" class="tag-txt" fill="#00ffff">Embedded Systems</text>
  </g>
  <!-- tag: IoT -->
  <g class="card c2">
    <rect x="154" y="271" width="48" height="20" rx="10" fill="#39ff14" fill-opacity="0.1" stroke="#39ff14" stroke-width="0.7" stroke-opacity="0.4"/>
    <text x="178" y="285" text-anchor="middle" class="tag-txt" fill="#39ff14">IoT</text>
  </g>
  <!-- tag: ML -->
  <g class="card c3">
    <rect x="210" y="271" width="112" height="20" rx="10" fill="#cc66ff" fill-opacity="0.1" stroke="#cc66ff" stroke-width="0.7" stroke-opacity="0.4"/>
    <text x="266" y="285" text-anchor="middle" class="tag-txt" fill="#cc66ff">Machine Learning</text>
  </g>
  <!-- tag: Web Dev -->
  <g class="card c4">
    <rect x="330" y="271" width="66" height="20" rx="10" fill="#ff66cc" fill-opacity="0.1" stroke="#ff66cc" stroke-width="0.7" stroke-opacity="0.4"/>
    <text x="363" y="285" text-anchor="middle" class="tag-txt" fill="#ff66cc">Web Dev</text>
  </g>
  <!-- tag: C/C++ -->
  <g class="card c5">
    <rect x="404" y="271" width="52" height="20" rx="10" fill="#ffaa33" fill-opacity="0.1" stroke="#ffaa33" stroke-width="0.7" stroke-opacity="0.4"/>
    <text x="430" y="285" text-anchor="middle" class="tag-txt" fill="#ffaa33">C / C++</text>
  </g>
  <!-- tag: Python -->
  <g class="card c1">
    <rect x="464" y="271" width="58" height="20" rx="10" fill="#00ffff" fill-opacity="0.08" stroke="#00ffff" stroke-width="0.7" stroke-opacity="0.35"/>
    <text x="493" y="285" text-anchor="middle" class="tag-txt" fill="#00ffff">Python</text>
  </g>
  <!-- tag: ESP32 -->
  <g class="card c2">
    <rect x="530" y="271" width="54" height="20" rx="10" fill="#39ff14" fill-opacity="0.08" stroke="#39ff14" stroke-width="0.7" stroke-opacity="0.3"/>
    <text x="557" y="285" text-anchor="middle" class="tag-txt" fill="#39ff14">ESP32</text>
  </g>

  <!-- bottom divider -->
  <line x1="40" y1="305" x2="640" y2="305" stroke="#00ffff" stroke-width="0.5" opacity="0.2"/>

  <!-- footer -->
  <text x="340" y="322" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="10" fill="#ff00aa" letter-spacing="2" opacity="0.7">[ HARDWARE TALKS. SOFTWARE LISTENS. I MAKE THEM UNDERSTAND. ]</text>

</svg>
